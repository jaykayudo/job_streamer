services:
  database:
    image: postgres:17
    volumes:
      - job-streamer-db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
  selenium-hub:
    image: seleniarm/standalone-chromium:latest
    container_name: selenium-hub
    shm_size: 2g
    ports:
      - "4444:4444"
      - "7900:7900"
    environment:
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
      - SE_NODE_MAX_SESSIONS=10
      - SE_NODE_SESSION_TIMEOUT=300
      - SE_START_XVFB=true


  redis:
    container_name: redis
    image: redis:latest
    ports:
      - "6379:6379"


volumes:
  job-streamer-db-data:

networks:
  default:
    name: job-streamer