[alembic]
# Path to migration scripts
script_location = storage/migrations

# Template for migration file names: <rev>_<slug>.py
file_template = %%(rev)s_%%(slug)s

# Prepend sys.path entries (one per line)
prepend_sys_path = .

# Timezone for revision timestamps
timezone = UTC

# SQLAlchemy connection URL — overridden at runtime by env.py using SETTINGS.DATABASE_URL,
# but alembic offline mode needs something here as a fallback.
sqlalchemy.url = sqlite:///example.db


[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
